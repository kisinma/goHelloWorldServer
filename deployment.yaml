apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-sample-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-sample-app
  template:
    metadata:
      labels:
        app: go-sample-app
    spec:
      containers:
      - name: go-sample-app
        image: kisinma/repo-harness:__IMAGE_TAG__
        ports:
        - containerPort: 8080
